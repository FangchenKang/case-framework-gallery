<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">基层治理问题—机制—结果图</title>
  <desc id="desc">黑白三段式分析图，展示基层治理中问题、治理机制与结果之间的递进关系。</desc>
  <rect width="1200" height="760" fill="#f8f8f6"/>
  <text x="600" y="112" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="36" font-weight="700" fill="#111">基层治理问题—机制—结果图</text>
  <rect x="96" y="186" width="288" height="390" fill="#fff" stroke="#222" stroke-width="3"/>
  <rect x="456" y="186" width="288" height="390" fill="#fff" stroke="#222" stroke-width="3"/>
  <rect x="816" y="186" width="288" height="390" fill="#fff" stroke="#222" stroke-width="3"/>
  <text x="240" y="248" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#111">问题</text>
  <text x="600" y="248" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#111">机制</text>
  <text x="960" y="248" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#111">结果</text>
  <line x1="144" y1="288" x2="336" y2="288" stroke="#333" stroke-width="2"/>
  <line x1="504" y1="288" x2="696" y2="288" stroke="#333" stroke-width="2"/>
  <line x1="864" y1="288" x2="1056" y2="288" stroke="#333" stroke-width="2"/>
  <text x="240" y="346" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">主体分散</text>
  <text x="240" y="396" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">责任悬浮</text>
  <text x="240" y="446" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">资源错配</text>
  <text x="600" y="346" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">党建统合</text>
  <text x="600" y="396" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">协同动员</text>
  <text x="600" y="446" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">数字赋能</text>
  <text x="960" y="346" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">响应提速</text>
  <text x="960" y="396" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">信任重建</text>
  <text x="960" y="446" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">秩序生成</text>
  <path d="M388 381h58" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M748 381h58" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="160" y="610" width="880" height="62" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="600" y="650" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="20" fill="#333">从治理困境到制度化协同的解释链条</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
</svg>
