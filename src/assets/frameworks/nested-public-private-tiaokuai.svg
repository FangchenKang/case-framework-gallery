  <text x="600" y="440" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="18" fill="#ddd">角色转换</text>
  <path d="M434 326h51" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M766 326h-51" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M434 462h51" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M766 462h-51" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M297 500C366 604 834 604 903 500" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="9 8"/>
