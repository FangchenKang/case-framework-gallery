<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">高模糊—高冲突政策执行框架</title>
  <desc id="desc">黑白政策执行框架图，展示高模糊和高冲突条件下的执行压力、裁量空间与协商过程。</desc>
  <rect width="1200" height="760" fill="#f7f7f5"/>
  <rect x="70" y="62" width="1060" height="636" fill="none" stroke="#222" stroke-width="3"/>
  <text x="600" y="120" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="34" font-weight="700" fill="#111">高模糊—高冲突政策执行框架</text>
  <line x1="600" y1="170" x2="600" y2="624" stroke="#222" stroke-width="2"/>
  <line x1="170" y1="396" x2="1030" y2="396" stroke="#222" stroke-width="2"/>
  <text x="314" y="222" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="26" fill="#111">目标模糊</text>
  <text x="887" y="222" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="26" fill="#111">利益冲突</text>
  <rect x="170" y="278" width="285" height="104" rx="0" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="312" y="324" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">执行者裁量</text>
  <text x="312" y="356" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="18" fill="#555">解释空间扩大</text>
  <rect x="746" y="278" width="285" height="104" rx="0" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="888" y="324" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#111">行动者博弈</text>
  <text x="888" y="356" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="18" fill="#555">资源与责任争夺</text>
  <rect x="458" y="453" width="285" height="112" fill="#111"/>
  <text x="600" y="502" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="23" fill="#fff">协商式执行</text>
  <text x="600" y="538" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="18" fill="#ddd">动态调适 / 规则再造</text>
  <path d="M455 330h236" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M746 330H510" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M313 382C348 458 416 501 458 509" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M888 382C852 458 785 501 743 509" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>
</svg>
